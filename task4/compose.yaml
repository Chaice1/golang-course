services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "Ivbln173"
      POSTGRES_DB: subscriptions
    healthcheck:  
      test: ["CMD-SHELL","pg_isready -U postgres -d subscriptions"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  api:
    image: api:latest
    build:
      context: repo-stat
      dockerfile: Dockerfile.api
    container_name: api
    restart: unless-stopped
    ports:
      - 28080:8080
    volumes:
      - ./repo-stat/api/config/config.yaml:/config.yaml
    environment:
      - LISTEN_ADDRESS=:8080
      - SUBSCRIBER_ADDRESS=subscriber:8080
      - PROCESSOR_ADDRESS=processor:8080
    depends_on:
      - subscriber
      - processor

  subscriber:
    image: subscriber:latest
    build:
      context: repo-stat
      dockerfile: Dockerfile.subscriber
    container_name: subscriber
    restart: unless-stopped
    ports:
      - 28081:8080
    volumes:
      - ./repo-stat/migrations:/migrations 
      - ./repo-stat/subscriber/config/config.yaml:/config.yaml
    environment:
      - LISTEN_ADDRESS=:8080
      - API_ADDRESS=api:8080
      - DB_DSN=postgres://postgres:Ivbln173@db:5432/subscriptions?sslmode=disable
      - MIGRATION_PATH=file:///migrations
    depends_on:
      db:
        condition: service_healthy
  processor:
    image: processor:latest
    build:
      context: repo-stat
      dockerfile: Dockerfile.processor
    container_name: processor
    restart: unless-stopped
    ports:
      - 28082:8080
    volumes:
      - ./repo-stat/processor/config/config.yaml:/config.yaml
    environment:
      - LISTEN_ADDRESS=:8080
      - COLLECTOR_ADDRESS=collector:8080
    depends_on:
      - collector
      
  collector:
    image: collector:latest
    build:
      context: repo-stat
      dockerfile: Dockerfile.collector
    container_name: collector
    restart: unless-stopped
    ports:
      - 28083:8080
    volumes:
      - ./repo-stat/collector/config/config.yaml:/config.yaml
    environment:
      - LISTEN_ADDRESS=:8080
      - SUBSCRIBER_ADDRESS=subscriber:8080
    depends_on:
      - subscriber

  tests:
    image: tests:latest
    build:
      context: tests
    container_name: tests
    restart: "no"
    depends_on:
      - api
    entrypoint: ["true"]
  

volumes:
  pg_data: